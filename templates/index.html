<!DOCTYPE html>
<html>

<head>

    <title>Cultural Tourism in Malaysia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&family=Pacifico&display=swap"
        rel="stylesheet">

    <style>
        /* BODY */

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */

        .navbar-transparent {
            background: transparent !important;
            padding: 20px 0;
            z-index: 1000;
        }

        .brand-title {
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .navbar-nav .nav-link {
            color: white !important;
            margin-left: 25px;
            font-size: 16px;
            font-weight: 400;
        }

        .navbar-nav .nav-link:hover {
            color: #ffd54f !important;
        }

        /* HERO SECTION */

        .hero-section {

            background-image: url("../static/images/mainpic.jpeg");

            height: 100vh;

            background-size: cover;

            background-position: center;

            display: flex;

            align-items: center;

            justify-content: center;

            text-align: center;

            position: relative;

            color: white;

        }

        /* overlay */

        .hero-overlay {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0, 0, 0, 0.45);

        }

        /* hero content */

        .hero-content {

            position: relative;

            z-index: 2;

            max-width: 900px;

        }

        .hero-small {

            font-size: 24px;

            font-weight: 300;

            margin-bottom: 10px;

        }

        .hero-title {

            font-family: 'Playfair Display', serif;

            font-size: 70px;

            font-weight: 600;

        }

        .hero-malaysia {

            font-family: 'Pacifico', cursive;

            color: #ffd54f;

            font-size: 60px;

            margin-bottom: 20px;

        }

        .hero-text {

            font-size: 18px;

            margin-bottom: 30px;

        }

        /* button */

        .explore-btn {

            background: #ffd54f;

            color: black;

            padding: 12px 35px;

            font-size: 18px;

            border-radius: 30px;

            border: none;

        }

        .explore-btn:hover {

            background: #ffca28;

            color: black;

        }

        /* SCROLL NAVBAR */

        .navbar-scrolled {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        /* GALLERY */

        .gallery-img {
            border-radius: 10px;
            cursor: pointer;
            transition: 0.4s;
        }

        .gallery-img:hover {
            transform: scale(1.05);
        }

        /* IMAGE POPUP */

        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .popup img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <script>

        window.addEventListener("scroll", function () {

            let navbar = document.querySelector(".navbar");

            if (window.scrollY > 80) {
                navbar.classList.add("navbar-scrolled");
            }
            else {
                navbar.classList.remove("navbar-scrolled");
            }

        });

    </script>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark navbar-transparent fixed-top">

        <div class="container">

            <a class="navbar-brand brand-title" href="index.html">
                Malaysia Cultural Tourism
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

                <ul class="nav nav-underline">

                    <li class="nav-item">
                        <a class="nav-link text-white" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="cultural.html">Cultural Places</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="festivals.html">Festivals</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="food.html">Food</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="about.html">About</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- HERO SECTION -->

    <section class="hero-section">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <h2 class="hero-small">
                Discover the Beauty of
            </h2>

            <h1 class="hero-title">
                Cultural Tourism
            </h1>

            <h2 class="hero-malaysia">
                in Malaysia
            </h2>

            <p class="hero-text">

                Experience Malaysia's unique heritage through captivating cultural destinations,
                vibrant festivals, and diverse culinary experiences.

            </p>

            <a href="cultural.html" class="btn explore-btn">
                Explore Now
            </a>

        </div>

    </section>



    <div id="imagePopup" class="popup" onclick="closeImage()">
        <img id="popupImg">
    </div>

    <script>

        function openImage(src) {
            document.getElementById("imagePopup").style.display = "flex";
            document.getElementById("popupImg").src = src;
        }

        function closeImage() {
            document.getElementById("imagePopup").style.display = "none";
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
